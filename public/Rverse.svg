<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" role="img" aria-label="Rverse gradient wordmark">
  <title>Rverse</title>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"></stop>
      <stop offset="50%" stop-color="#22D3EE"></stop>
      <stop offset="100%" stop-color="#10B981"></stop>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"></feGaussianBlur>
      <feOffset in="blur" dx="0" dy="2" result="off"></feOffset>
      <feMerge>
        <feMergeNode in="off"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#0B1020"></rect>
  <g transform="translate(70,190)" filter="url(#s)">
    <text x="0" y="0" font-family="Poppins, Inter, Segoe UI, Arial, sans-serif" font-weight="800" font-size="170" letter-spacing="3" fill="url(#g)">
      Rverse
    </text>

    <!-- Underline accent -->
    <path d="M5 30 C 180 70, 430 70, 690 30" fill="none" stroke="url(#g)" stroke-width="10" stroke-linecap="round" opacity="0.9"></path>
  </g>
</svg>
